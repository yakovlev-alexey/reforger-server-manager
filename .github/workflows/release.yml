name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/rsm-${{ matrix.suffix }} \
            ./cmd/rsm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsm-${{ matrix.suffix }}
          path: dist/rsm-${{ matrix.suffix }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum rsm-linux-amd64 rsm-linux-arm64 > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/rsm-linux-amd64
            dist/rsm-linux-arm64
            dist/checksums.txt
          body: |
            ## Installation

            ### Linux (amd64)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rsm-linux-amd64 -o rsm
            chmod +x rsm
            sudo mv rsm /usr/local/bin/rsm
            ```

            ### Linux (arm64)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rsm-linux-arm64 -o rsm
            chmod +x rsm
            sudo mv rsm /usr/local/bin/rsm
            ```

            ### Verify checksum
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.txt | sha256sum --check --ignore-missing
            ```
